global:
  scrape_interval: 15s
  evaluation_interval: 30s
  external_labels:
    project: poi-lake

scrape_configs:
  # FastAPI exposes /metrics for HTTP + pipeline counters that get incremented
  # in-process. The api container is a single replica so this is straightforward.
  - job_name: poi-lake-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  # dramatiq's PrometheusMiddleware exposes its own server on 9191 inside
  # the worker container. With docker-compose.prod.yml we publish 9191 so
  # Prometheus on the same network can scrape.
  - job_name: poi-lake-worker
    static_configs:
      - targets: ["worker:9191"]
